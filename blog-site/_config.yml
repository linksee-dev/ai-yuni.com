lang: zh-CN
timezone: Asia/Shanghai

title: Yuni Notes
tagline: Newsletter + Blog Hub for Indie Builder Notes
description: >-
  一个聚合 blog 与 newsletter 的内容中心。所有内容统一写在 _posts，
  GitHub Pages 与本地站点保持同源同步。

# 生产域名与子目录
url: "https://ai-yuni.com"
baseurl: "/blog"

github:
  username: linksee-dev

social:
  name: Yuni
  email: hi@yuni.dev
  links:
    - https://github.com/linksee-dev
    - https://bsky.app/profile/linksee-dev.bsky.social
    - https://linkstack.lgbt/@yuni
    - https://egolinks.online/@yuniaigc

theme: jekyll-theme-chirpy

# Chirpy / SEO
toc: true
comments:
  active: false

# 让首页展示文章列表
paginate: 10
permalink: /:year/:month/:day/:title/

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  -
    scope:
      path: ""
      type: posts
    values:
      layout: post
      author: Yuni
      toc: true
      comments: false

exclude:
  - README.md
  - IMPLEMENTATION.md
  - reference.png
  - vendor
  - node_modules
  - scripts
